
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>ChromaSketch AI - Pro Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #4f46e5;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #020617;
            color: #f8fafc;
            /* Use dynamic viewport height for mobile browsers */
            height: 100dvh;
            overflow: hidden;
        }
        #root {
            height: 100dvh;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.05);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        
        /* Paper Texture Overlays */
        .paper-grain::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 0.04;
            background-image: url("https://www.transparenttextures.com/patterns/paper-fibers.png");
            mix-blend-mode: multiply;
        }
        .canvas-texture::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 0.08;
            background-image: url("https://www.transparenttextures.com/patterns/canvas-orange.png");
            mix-blend-mode: multiply;
        }
        
        @keyframes subtle-glow {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }
        .ai-glow {
            animation: subtle-glow 3s infinite ease-in-out;
        }

        /* Prevent overscroll bounce on mobile */
        html, body {
            overscroll-behavior-y: none;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.35.0"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
</body>
</html>
